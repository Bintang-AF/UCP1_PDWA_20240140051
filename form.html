<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Anggota - Tech Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="./index.html">Tech Community</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="./index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="./form.html">Daftar Anggota</a></li>
                    <li class="nav-item"><a class="nav-link" href="./gallery.html">Multimedia</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">Form Pendaftaran Anggota</h2>
                        <form id="registrationForm">
                            <div class="mb-3">
                                <label for="nama" class="form-label">Nama Lengkap</label>
                                <input type="text" class="form-control" id="nama" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Alamat Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-4">
                                <label for="minat" class="form-label">Bidang Minat</label>
                                <select class="form-select" id="minat" required>
                                    <option value="" disabled selected>Pilih minat...</option>
                                    <option value="Software Development">Software Development</option>
                                    <option value="Networking & Infrastruktur">Networking & Infrastruktur</option>
                                    <option value="Sistem Informasi">Sistem Informasi</option>
                                    <option value="Game & Manajemen Turnamen">Game & Manajemen Turnamen</option>
                                </select>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Submit Data</button>
                                <a href="./index.html" class="btn btn-outline-secondary">Kembali ke Home</a> </div>
                        </form>

                        <div id="resultArea" class="mt-4 d-none">
                            <div class="alert alert-success">
                                <h5>Data Berhasil Ditambahkan!</h5>
                                <p id="resultText" class="mb-0"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
