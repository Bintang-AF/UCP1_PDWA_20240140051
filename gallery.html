<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia - Tech Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="./index.html">Tech Community</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="./index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="./form.html">Daftar Anggota</a></li>
                    <li class="nav-item"><a class="nav-link active" href="./gallery.html">Multimedia</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 mb-5">
        <h2 class="text-center mb-4">Galeri & Multimedia</h2>
        <div class="row g-4">
            
            <div class="col-md-6">
                <div class="card shadow-sm border-0 h-100">
                    <img id="komunitasImg" src="https://images.unsplash.com/photo-1517048676732-d65bc937f952?q=80&w=800&auto=format&fit=crop" class="card-img-top" alt="Setup Teknologi">
                    <div class="card-body text-center">
                        <h5 class="card-title">Setup Kolaborasi</h5>
                        <button id="btnGantiGambar" class="btn btn-outline-primary mt-2">Ganti Gambar</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="ratio ratio-16x9">
                        <iframe src="https://www.youtube.com/embed/ncfpyfoJr38?si=Xpf0JPVQ7flTTn1D" title="YouTube video" allowfullscreen></iframe>
                    </div>
                    <div class="card-body text-center">
                        <h5 class="card-title">Video Inspiratif</h5>
                    </div>
                </div>
            </div>

            <div class="col-md-12">
                <div class="card shadow-sm border-0 text-center p-4">
                    <h5>Podcast Komunitas</h5>
                    <audio id="podcastAudio" src="./thank-you-stan.mp3"></audio>
                    <div class="mt-3">
                        <button id="btnPlay" class="btn btn-success me-2">Play Audio</button>
                        <button id="btnPause" class="btn btn-danger me-2">Pause Audio</button>
                        <button id="btnInfo" class="btn btn-info text-white">Info Audio</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
